<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>speed tester</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <section id="main-menu" class="main-menu">
    <img src="assets/game-logo.png" alt="">
    <label for="">Select game length:</label>
    <select style="padding: 20px" id="length">
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="20">20</option>
      <option value="30">30</option>
    </select>

    <label for="">Select a difficulty:</label>
    <select style="padding: 20px" id="difficulty">
      <option value="12">Easy</option>
      <option value="16">medium</option>
      <option value="20">High</option>
    </select>
    <button style="padding: 20px" id="start">Click me to start!</button>
    <button style="padding: 20px" id="past-scores">view past scores</button>
    <h3 id="result-past-scores"></h3>
  </section>

  <h1 id="counter">0</h1>
  <section class="game-container" id="game-container">
  </section>

  <section class="result-screen" id="result-screen">
    <h1>Average Score:</h1>
    <h1 id="average"></h1>
    <button style="padding: 20px" id="reset">New Game</button>
  </section>


  <script src="code.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>speed tester</title>
  <style>
    #counter {
      display: none;
    }


    .main-menu {
      display: flex;
      flex-direction: column;
      gap: 1em;
    }

    .game-container {
      display: grid;
      grid-template-columns: auto auto auto auto;
    }

    .game-container div {
      background-color: #f1f1f1;
      border: 1px solid black;
      height: 150px;
      font-size: 30px;
      text-align: center;
    }

    .result-screen {
      display: none;
      flex-direction: column;
      gap: 1em;
    }
  </style>
</head>

<body>
  <section id="main-menu" class="main-menu">
    <h1>Khaled's Rection Time Game</h1>
    <label for="">Select game length:</label>
    <select style="padding: 20px" id="length">
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="20">20</option>
      <option value="30">30</option>
    </select>

    <label for="">Select a difficulty:</label>
    <select style="padding: 20px" id="difficulty">
      <option value="12">Easy</option>
      <option value="16">medium</option>
      <option value="20">High</option>
    </select>
    <button style="padding: 20px" id="start">Click me to start!</button>
  </section>

  <h1 id="counter">0</h1>
  <section class="game-container" id="game-container">
  </section>

  <section class="result-screen" id="result-screen">
    <h1>Average Score:</h1>
    <h2 id="average"></h2>
    <button id="reset">New Game</button>
  </section>

  <script>
    const mainMenu = document.getElementById("main-menu");
    const gameContainer = document.getElementById("game-container");
    const resultScreen = document.getElementById("result-screen")

    const start = document.getElementById("start");
    const counter = document.getElementById("counter");
    const average = document.getElementById("average");
    const length = document.getElementById("length");
    const reset = document.getElementById("reset")

    const times = [];
    const boxes = [];

    start.addEventListener("click", () => {
      initializeGame()
      setTimeout(() => { runGame(); }, 2000)

    });


    let difficulty;

    function initializeGame() {
      mainMenu.style.display = "none";
      counter.style.display = "flex"
      difficulty = document.getElementById("difficulty").value;

      for (i = 0; i < +difficulty; i++) {
        generateBox(i);
        boxes.push(document.getElementById(`${i}`));
      }


    }

    let randomIndex, div;

    function runGame() {
      if (counter.textContent == length.value) return runScore();
      randomIndex = Math.floor(Math.random() * boxes.length);
      div = boxes[randomIndex];
      div.style.backgroundColor = "red";
      startTimer();

      div.addEventListener(
        "click",
        function () {
          div.style.backgroundColor = "green";
          stopTimer();

          setTimeout(() => {
            div.style.backgroundColor = "#f1f1f1";
          }, 100);
          increaseCounter();
          setTimeout(() => {
            runGame();
          }, 1000);
        },
        { once: true },
      );
    }

    function generateBox(BoxId) {

      gameContainer.appendChild(Object.assign(document.createElement('div'), { id: BoxId }));
    }

    let sumTimes
    let averages = [];

    function runScore() {
      gameContainer.style.display = "none";
      resultScreen.style.display = "flex";

      sumTimes = 0;
      times.forEach((time) => {
        sumTimes = sumTimes + time;
      });

      average.textContent = sumTimes / +length.value;

      reset.addEventListener("click", () => {
        resultScreen.style.display = "none";
        mainMenu.style.display = "flex";
        averages.push(average.textContent)
        console.log(averages)
        average.textContent = "";
      }, { once: true })
    }

    function increaseCounter() {
      counter.textContent = +counter.textContent + 1;
      console.log(counter.textContent);
    }

    let totalTime, startTime, endTime;

    function startTimer() {
      startTime = performance.now();
    }

    function stopTimer() {
      endTime = performance.now();
      totalTime = Math.floor(endTime - startTime);
      times.push(totalTime);
      console.log(times);
    }
  </script>
</body>

</html>

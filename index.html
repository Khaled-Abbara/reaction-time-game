<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>speed tester</title>
  <style>
    /* Reset and body */
    body,
    html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
    }

    /* Main menu styling */
    .main-menu {
      display: flex;
      flex-direction: column;
      gap: 1em;
      padding: 2em;
      max-width: 400px;
      margin: 2em auto;
      background-color: #1f1f1f;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    }

    .main-menu h1 {
      text-align: center;
      color: #ffffff;
    }

    .main-menu label {
      margin-bottom: 0.5em;
    }

    .main-menu select,
    .main-menu button {
      padding: 15px;
      border: none;
      border-radius: 5px;
      background-color: #2c2c2c;
      color: #e0e0e0;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .main-menu button:hover,
    .main-menu select:hover {
      background-color: #3a3a3a;
    }

    /* Counter */
    #counter {
      display: none;
      font-size: 4em;
      text-align: center;
      color: #ff5252;
    }

    /* Game container */
    .game-container {
      display: grid;
      gap: 10px;
      grid-template-columns: auto auto auto auto;
      max-width: 600px;
      margin: 2em auto;
    }

    .game-container div {
      background-color: #2c2c2c;
      border: 2px solid #444;
      border-radius: 8px;
      height: 120px;
      font-size: 1.5em;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;

      /* Smooth color transitions */
      transition: background-color 0.25s ease, transform 0.2s ease;
    }

    /* Flash effect when active */
    .game-container div.active {
      background-color: #ff5252 !important;
      /* matches JS active red */
      transform: scale(1.05);
    }

    /* Flash effect when clicked */
    .game-container div.success {
      background-color: #4caf50 !important;
      /* matches JS success green */
      transform: scale(1.05);
    }

    /* Result screen */
    .result-screen {
      display: none;
      flex-direction: column;
      gap: 1em;
      text-align: center;
      margin: 2em auto;
    }

    .result-screen h1,
    .result-screen h2 {
      color: #ffffff;
    }

    .result-screen button {
      padding: 15px;
      border: none;
      border-radius: 5px;
      background-color: #2c2c2c;
      color: #e0e0e0;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .result-screen button:hover {
      background-color: #3a3a3a;
    }
  </style>
</head>

<body>
  <section id="main-menu" class="main-menu">
    <h1>Khaled's Rection Time Game</h1>
    <label for="">Select game length:</label>
    <select style="padding: 20px" id="length">
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="20">20</option>
      <option value="30">30</option>
    </select>

    <label for="">Select a difficulty:</label>
    <select style="padding: 20px" id="difficulty">
      <option value="12">Easy</option>
      <option value="16">medium</option>
      <option value="20">High</option>
    </select>
    <button style="padding: 20px" id="start">Click me to start!</button>
    <button style="padding: 20px" id="past-scores">view past scores</button>
    <h3 id="result-past-scores"></h3>
  </section>

  <h1 id="counter">0</h1>
  <section class="game-container" id="game-container">
  </section>

  <section class="result-screen" id="result-screen">
    <h1>Average Score:</h1>
    <h2 id="average"></h2>
    <button style="padding: 20px" id="reset">New Game</button>
  </section>

  <audio autoplay>
    <source src="https://cdn.freesound.org/previews/733/733259_11915007-lq.mp3" type="audio/mpeg">
  </audio>
  <script>
    /* ---------------- DOM REFERENCES ---------------- */

    const elements = {
      mainMenu: document.getElementById("main-menu"),
      gameContainer: document.getElementById("game-container"),
      resultScreen: document.getElementById("result-screen"),
      start: document.getElementById("start"),
      counter: document.getElementById("counter"),
      average: document.getElementById("average"),
      length: document.getElementById("length"),
      difficulty: document.getElementById("difficulty"),
      reset: document.getElementById("reset"),
      pastScores: document.getElementById("past-scores"),
      resultPastScores: document.getElementById("result-past-scores")
    };

    /* ---------------- GAME STATE ---------------- */

    const gameState = {
      boxes: [],
      times: [],
      averages: [],
      startTime: 0
    };

    /* ---------------- COLORS ---------------- */

    const COLORS = {
      active: "red",
      success: "green",
      default: "#2c2c2c"
    };

    /* ---------------- EVENT LISTENERS ---------------- */

    elements.start.addEventListener("click", startGame);
    elements.reset.addEventListener("click", resetGame);
    elements.pastScores.addEventListener("click", showPastScores)

    /* ---------------- GAME FLOW ---------------- */

    function startGame() {

      initializeGame();

      setTimeout(runGame, 2000);
    }

    function initializeGame() {

      elements.mainMenu.style.display = "none";
      elements.counter.style.display = "flex";

      const difficulty = Number(elements.difficulty.value);

      for (let i = 0; i < difficulty; i++) {
        createBox(i);
      }
    }

    function runGame() {

      const targetRounds = Number(elements.length.value);
      const currentRound = Number(elements.counter.textContent);

      if (currentRound === targetRounds) {
        showResults();
        return;
      }

      highlightRandomBox();
    }

    /* ---------------- BOX LOGIC ---------------- */

    function createBox(id) {

      const box = document.createElement("div");
      box.id = id;

      elements.gameContainer.appendChild(box);
      gameState.boxes.push(box);
    }

    function highlightRandomBox() {

      const index = Math.floor(Math.random() * gameState.boxes.length);
      const box = gameState.boxes[index];

      box.style.backgroundColor = COLORS.active;

      startTimer();

      box.addEventListener("click", () => handleBoxClick(box), { once: true });
    }

    function handleBoxClick(box) {

      box.style.backgroundColor = COLORS.success;

      stopTimer();

      setTimeout(() => {
        box.style.backgroundColor = COLORS.default;
      }, 100);

      increaseCounter();

      setTimeout(runGame, 1000);
    }

    /* ---------------- TIMER ---------------- */

    function startTimer() {
      gameState.startTime = performance.now();
    }

    function stopTimer() {

      const endTime = performance.now();
      const totalTime = Math.floor(endTime - gameState.startTime);

      gameState.times.push(totalTime);
    }

    /* ---------------- COUNTER ---------------- */

    function increaseCounter() {

      const newValue = Number(elements.counter.textContent) + 1;
      elements.counter.textContent = newValue;
    }

    /* ---------------- RESULTS ---------------- */

    function showResults() {

      elements.gameContainer.style.display = "none";
      elements.resultScreen.style.display = "flex";

      const sum = gameState.times.reduce((a, b) => a + b, 0);

      const avg = Math.floor(sum / Number(elements.length.value));

      elements.average.textContent = `${Math.round(avg)} ms`;

      gameState.averages.push(avg);
    }

    function showPastScores() {
      if (gameState.averages.length > 0) {

        var message = ""
        for (let i = 0; i < gameState.averages.length; i++) {
          message += `Game ${i + 1}: ${gameState.averages[i]} <br>`
        }
        elements.resultPastScores.innerHTML = message;

      } else {
        elements.resultPastScores.textContent = "You haven't played yet";
      }
    }
    /* ---------------- RESET ---------------- */

    function resetGame() {

      gameState.times = [];
      gameState.boxes = [];

      elements.counter.textContent = "0";
      elements.average.textContent = "";
      elements.resultPastScores.textContent = "";

      elements.gameContainer.innerHTML = "";
      elements.gameContainer.style.display = "grid";

      elements.counter.style.display = "none";
      elements.resultScreen.style.display = "none";
      elements.mainMenu.style.display = "flex";
    }

  </script>
</body>

</html>

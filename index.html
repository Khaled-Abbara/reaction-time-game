<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction Game</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <section class="main-menu" id="main-menu">
    <img src="assets/game-logo.png" alt="">
    <button class="btn" id="start">Click me to start!</button>
  </section>

  <h1 id="counter">0</h1>
  <section class="game-container" id="game-container">
  </section>

  <section class="result-screen" id="result-screen">
    <h1>Average Score:</h1>
    <h1 id="average"></h1>
    <button style="padding: 20px" id="reset">New Game</button>
  </section>


  <script src="code.js"></script>
</body>

</html>
